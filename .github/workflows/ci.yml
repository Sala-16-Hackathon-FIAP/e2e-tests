name: CI - e2e-tests

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-e2e-tests]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: fiapx-cluster

jobs:
  e2e-tests:
    name: E2E BDD Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get service URLs
        id: urls
        run: |
          API_GW_HOST=$(kubectl get svc api-gateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -n "$API_GW_HOST" ]; then
            BASE_URL="http://${API_GW_HOST}"
            echo "auth_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "upload_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "processor_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "status_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "notification_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "auth_url=http://$(kubectl get svc auth-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> "$GITHUB_OUTPUT"
            echo "upload_url=http://$(kubectl get svc upload-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> "$GITHUB_OUTPUT"
            echo "processor_url=http://$(kubectl get svc video-processor-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> "$GITHUB_OUTPUT"
            echo "status_url=http://$(kubectl get svc status-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> "$GITHUB_OUTPUT"
            echo "notification_url=http://$(kubectl get svc notification-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Port-forward RabbitMQ
        run: |
          kubectl port-forward svc/rabbitmq 5672:5672 -n messaging &
          sleep 5
          echo "RabbitMQ port-forward established on localhost:5672"

      - name: Run E2E tests
        run: |
          mvn -B test \
            -Dauth.url=${{ steps.urls.outputs.auth_url }} \
            -Dupload.url=${{ steps.urls.outputs.upload_url }} \
            -Dprocessor.url=${{ steps.urls.outputs.processor_url }} \
            -Dstatus.url=${{ steps.urls.outputs.status_url }} \
            -Dnotification.url=${{ steps.urls.outputs.notification_url }} \
            -Drabbitmq.host=localhost \
            -Drabbitmq.user=${{ secrets.RABBITMQ_USERNAME }} \
            -Drabbitmq.pass=${{ secrets.RABBITMQ_PASSWORD }} \
            -Ds3.bucket=${{ secrets.S3_BUCKET }}

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-report.html
            target/cucumber-report.json
          retention-days: 30
